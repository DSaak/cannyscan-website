document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

partner<\/a>\n          <\/div>\n        <\/div>\n\n        <!-- hero product mock (app screenshot) -->\n        <div data-reveal=\"\" style=\"position:relative;animation:csfloat 7s ease-in-out infinite;\">\n          <div style=\"position:absolute;inset:-30px -20px;background:radial-gradient(closest-side,rgba(42,157,99,.18),transparent 70%);pointer-events:none;\"><\/div>\n          <div style=\"position:relative;background:#fff;border:1px solid rgba(20,40,28,.1);border-radius:16px;box-shadow:0 24px 60px rgba(16,42,28,.16);overflow:hidden;\">\n            <div style=\"display:flex;align-items:center;gap:7px;padding:12px 15px;border-bottom:1px solid rgba(20,40,28,.07);background:#f7faf6;\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:#e2655a;\"><\/span>\n              <span style=\"width:9px;height:9px;border-radius:50%;background:#e6b03a;\"><\/span>\n              <span style=\"width:9px;height:9px;border-radius:50%;background:#43b06a;\"><\/span>\n              <span style=\"margin-left:9px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a9a90;\">cannyscan \u00b7 Camden assessment<\/span>\n            <\/div>\n            <div style=\"padding:18px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8a9a90;\">Proposal<\/div>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#1C7A4D;background:#e6f2ea;border-radius:5px;padding:2px 7px;\">Camden Local Plan<\/div>\n              <\/div>\n              <div style=\"font-size:13px;color:#33473b;background:#f3f6f1;border:1px solid rgba(20,40,28,.07);border-radius:9px;padding:11px 13px;margin-bottom:16px;\">Three-storey infill \u2014 pitched roof, brick fa\u00e7ade facing a conservation frontage.<\/div>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px;\">\n                <div style=\"background:#eef7f1;border:1px solid #c9e6d6;border-radius:11px;padding:13px;\">\n                  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:#1C7A4D;margin-bottom:9px;\">Measurable<\/div>\n                  <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                    <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#33473b;\"><span style=\"width:15px;height:15px;border-radius:5px;background:#1C7A4D;display:grid;place-items:center;color:#fff;font-size:9px;\">\u2713<\/span> Height 11.2m<\/div>\n                    <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#33473b;\"><span style=\"width:15px;height:15px;border-radius:5px;background:#1C7A4D;display:grid;place-items:center;color:#fff;font-size:9px;\">\u2713<\/span> Setback 4m<\/div>\n                    <div style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#33473b;\"><span style=\"width:15px;height:15px;border-radius:5px;background:#d99425;display:grid;place-items:center;color:#fff;font-size:9px;\">!<\/span> Density review<\/div>\n                  <\/div>\n                <\/div>\n                <div style=\"background:#f7faf6;border:1px solid rgba(20,40,28,.1);border-radius:11px;padding:13px;\">\n                  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:#56695e;margin-bottom:9px;\">Judgement<\/div>\n                  <div style=\"font-size:12px;color:#33473b;line-height:1.4;margin-bottom:9px;\">Roofline reads as coherent with the conservation frontage.<\/div>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:5px;\">\n                    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;color:#1C7A4D;background:#e6f2ea;border:1px solid #c9e6d6;border-radius:5px;padding:2px 6px;\">Policy D1 \u00a74.2<\/span>\n                    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;color:#56695e;background:#eef0ec;border-radius:5px;padding:2px 6px;\">conf 0.78<\/span>\n                  <\/div>\n                <\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n    <\/section>\n\n    <!-- ===== Problem (compact) ===== -->\n    <section id=\"problem\" style=\"background:#d3e6d8;border-top:1px solid rgba(20,40,28,.08);\">\n      <div data-pad=\"\" style=\"max-width:1140px;margin:0 auto;padding:72px 28px 64px;\">\n      <div data-reveal=\"\" style=\"max-width:680px;margin-bottom:34px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#1C7A4D;margin:0 0 14px;\">The problem<\/p>\n        <h2 style=\"font-family: 'Space Grotesk',sans-serif; font-weight: 600; font-size: 34px; line-height: 1.1; letter-spacing: -.02em; margin: 0 0 14px; color: #102a1c\">Planning slows where professional is needed<\/h2>\n        <p style=\"font-size:17px;color:#52665b;margin:0;\">Measurable rules are simple. Judgment calls on subjective criteria are complex and delay decision-making.<\/p>\n      <\/div>\n      <div data-stack=\"\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:600;color:#1C7A4D;line-height:1;letter-spacing:-.02em;\">~140<span style=\"font-size:18px;color:#7a8b80;\"> days<\/span><\/div>\n          <div style=\"color:#52665b;font-size:14px;margin-top:11px;\">Average Swiss building-permit timeline \u2014 nearly two months longer than in 2010.<\/div>\n        <\/div>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:600;color:#1C7A4D;line-height:1;letter-spacing:-.02em;\">~50<span style=\"font-size:18px;color:#7a8b80;\">%<\/span><\/div>\n          <div style=\"color:#52665b;font-size:14px;margin-top:11px;\">Of UK applications that face delays.<\/div>\n        <\/div>\n        <div data-reveal=\"\" style=\"background:#102a1c;border-radius:16px;padding:24px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:600;color:#fff;line-height:1.1;letter-spacing:-.01em;\">The gap<\/div>\n          <div style=\"color:#a9c2b3;font-size:14px;margin-top:11px;\">Tools check the numbers. The contested, judgment-based calls go unsupported.<\/div>\n        <\/div>\n      <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== Product ===== -->\n    <section id=\"product\" style=\"border-top:1px solid rgba(20,40,28,.07);border-bottom:1px solid rgba(20,40,28,.07);background:#f5f8f4;\">\n      <div data-pad=\"\" style=\"max-width:1140px;margin:0 auto;padding:78px 28px;\">\n        <div data-2col=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:54px;align-items:center;\">\n          <div data-reveal=\"\">\n            <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#1C7A4D;margin:0 0 14px;\">The product<\/p>\n            <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:36px;line-height:1.1;letter-spacing:-.02em;margin:0 0 18px;color:#102a1c;\">A copilot for developing and accessing planning projects.<\/h2>\n            <p style=\"font-size:17px;color:#52665b;margin:0 0 20px;\">Upload a proposal \u2014 text,&nbsp;drawings, maps \u2014 and let Canny Scan assess it against the up-to-date policies, regulations, zoning and wider context.<\/p>\n ;background:#43b06a;\"><\/span>\n                <span style=\"margin-left:9px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a9a90;\">cannyscan \u00b7 assessment + chat<\/span>\n              <\/div>\n              <div style=\"padding:16px;display:flex;flex-direction:column;gap:11px;\">\n                <div style=\"display:flex;gap:10px;\">\n                  <div style=\"flex:1;background:#eef7f1;border:1px solid #c9e6d6;border-radius:10px;padding:11px;\">\n                    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#1C7A4D;margin-bottom:7px;\">Provision identified<\/div>\n                    <div style=\"font-size:11.5px;color:#33473b;line-height:1.35;\">Design quality &amp; local character \u2014 Policy D1, D2<\/div>\n                  <\/div>\n                  <div style=\"width:78px;background:#f7faf6;border:1px solid rgba(20,40,28,.1);border-radius:10px;padding:11px;text-align:center;\">\n                    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;color:#56695e;text-transform:uppercase;letter-spacing:.05em;\">Conf.<\/div>\n                    <div style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:#1C7A4D;\">0.78<\/div>\n                  <\/div>\n                <\/div>\n                <div style=\"background:#f7faf6;border:1px solid rgba(20,40,28,.08);border-radius:10px;padding:11px;\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;\">\n                    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;color:#56695e;text-transform:uppercase;letter-spacing:.05em;\">Assessment<\/span>\n                    <span style=\"font-size:9.5px;color:#1C7A4D;background:#e6f2ea;border-radius:5px;padding:2px 7px;\">Judgement<\/span>\n                  <\/div>\n                  <div style=\"font-size:11.5px;color:#33473b;line-height:1.4;\">Massing is broadly consistent with the prevailing roofline; the brick fa\u00e7ade supports local character. Recommend conditions on fenestration detail.<\/div>\n                <\/div>\n                <!-- chat clarification -->\n                <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                  <div style=\"align-self:flex-end;max-width:78%;background:#1C7A4D;color:#fff;font-size:11px;border-radius:11px 11px 3px 11px;padding:8px 11px;\">Does the height breach the conservation cap?<\/div>\n                  <div style=\"align-self:flex-start;max-width:82%;background:#eef0ec;color:#33473b;font-size:11px;border-radius:11px 11px 11px 3px;padding:8px 11px;\">No \u2014 11.2m is within the 12m cap. Density triggers a separate review (Policy H1).<\/div>\n                <\/div>\n                <button style=\"margin-top:2px;border:0;cursor:pointer;background:linear-gradient(150deg,#2a9d63,#1C7A4D);color:#fff;font-family:'Public Sans',sans-serif;font-weight:600;font-size:11.5px;border-radius:9px;padding:9px;display:flex;align-items:center;justify-content:center;gap:6px;\">\u2b73 Export officer report<\/button>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <!-- comparison -->\n        <div data-reveal=\"\" style=\"margin-top:64px;\">\n          <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#1C7A4D;margin:0 0 12px;\">What makes it different<\/p>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:30px;line-height:1.1;letter-spacing:-.02em;margin:0 0 26px;color:#102a1c;\">Beyond rule-checking.<\/h2>\n          <div data-stack=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div style=\"background:#f3f6f1;border:1px solid rgba(20,40,28,.09);border-radius:16px;padding:24px;\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#7a8b80;margin-bottom:15px;\">Most compliance tools<\/div>\n              <div style=\"display:flex;flex-direction:column;gap:12px;\">\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#7a8b80;font-size:14px;\"><span style=\"margin-top:2px;color:#a9b6ad;flex:none;\">\u2715<\/span> Check the numbers \u2014 heights, density, setbacks<\/div>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#7a8b80;font-size:14px;\"><span style=\"margin-top:2px;color:#a9b6ad;flex:none;\">\u2715<\/span> Text only \u00b7 binary pass / fail<\/div>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#7a8b80;font-size:14px;\"><span style=\"margin-top:2px;color:#a9b6ad;flex:none;\">\u2715<\/span> Generic across geographies<\/div>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#7a8b80;font-size:14px;\"><span style=\"margin-top:2px;color:#a9b6ad;flex:none;\">\u2715<\/span> Replaces a checklist<\/div>\n              <\/div>\n            <\/div>\n            <div style=\"background:linear-gradient(160deg,#eef7f1,#fff);border:1px solid #bfe0cd;border-radius:16px;padding:24px;box-shadow:0 16px 36px rgba(28,122,77,.1);\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#1C7A4D;margin-bottom:15px;\">Canny Scan<\/div>\n              <div style=\"display:flex;flex-direction:column;gap:12px;\">\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#1a3326;font-size:14px;font-weight:500;\"><span style=\"margin-top:2px;color:#1C7A4D;flex:none;\">\u2713<\/span> Engages interpretive requirements \u2014 character, coherence, design<\/div>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#1a3326;font-size:14px;font-weight:500;\"><span style=\"margin-top:2px;color:#1C7A4D;flex:none;\">\u2713<\/span> Combines language and visual reasoning \u2014 plans, maps, drawings<\/div>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#1a3326;font-size:14px;font-weight:500;\"><span style=\"margin-top:2px;color:#1C7A4D;flex:none;\">\u2713<\/span> Grounded in local regulatory and spatial context<\/div>\n                <div style=\"display:flex;gap:10px;align-items:flex-start;color:#1a3326;font-size:14px;font-weight:500;\"><span style=\"margin-top:2px;color:#1C7A4D;flex:none;\">\u2713<\/span> Supports the planner's judgment, with an auditable trail<\/div>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== How it works ===== -->\n    <section id=\"how\" style=\"background:#d3e6d8;border-top:1px solid rgba(20,40,28,.08);\">\n      <div data-pad=\"\" style=\"max-width:1140px;margin:0 auto;padding:78px 28px;\">\n      <div data-reveal=\"\" style=\"max-width:680px;margin-bottom:36px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#1C7A4D;margin:0 0 14px;\">How it works<\/p>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:36px;line-height:1.1;letter-spacing:-.02em;margin:0;color:#102a1c;\">From proposal to reasoned guidance.<\/h2>\n      <\/div>\n      <div data-stack=\"\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:14px;padding:22px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"width:34px;height:34px;border-radius:9px;background:#e6f2ea;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1C7A4D;font-weight:500;margin-bottom:14px;\">01<\/div>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin:0 0 7px;color:#15281d;\">Choose your context<\/h3>\n          <p style=\"font-size:13.5px;color:#52665b;margin:0;\">Select the jurisdiction. The demo covers Camden and Z\u00fcrich.<\/p>\n        <\/div>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:14px;padding:22px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"width:34px;height:34px;border-radius:9px;background:#e6f2ea;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1C7A4D;font-weight:500;margin-bottom:14px;\">02<\/div>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin:0 0 7px;color:#15281d;\">Bring your proposal<\/h3>\n          <p style=\"font-size:13.5px;color:#52665b;margin:0;\">Write a description and, optionally, upload documents.<\/p>\n        <\/div>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:14px;padding:22px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"width:34px;height:34px;border-radius:9px;background:#e6f2ea;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1C7A4D;font-weight:500;margin-bottom:14px;\">03<\/div>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin:0 0 7px;color:#15281d;\">Get reasoned guidance<\/h3>\n          <p style=\"font-size:13.5px;color:#52665b;margin:0;\">Checks and judgement separated, each policy cited, confidence flagged.<\/p>\n        <\/div>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:14px;padding:22px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"width:34px;height:34px;border-radius:9px;background:#e6f2ea;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#1C7A4D;font-weight:500;margin-bottom:14px;\">04<\/div>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin:0 0 7px;color:#15281d;\">Decide with confidence<\/h3>\n          <p style=\"font-size:13.5px;color:#52665b;margin:0;\">Ask clarifications in chat and export an auditable officer report.<\/p>\n        <\/div>\n      <\/div>\n\n      <!-- who it's for -->\n      <div data-reveal=\"\" style=\"max-width:680px;margin:64px 0 30px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#1C7A4D;margin:0 0 12px;\">Who it's for<\/p>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:30px;line-height:1.1;letter-spacing:-.02em;margin:0;color:#102a1c;\">For the people who interpret the rules.<\/h2>\n      <\/div>\n      <div data-stack=\"\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"width:40px;height:40px;border-radius:11px;background:#e6f2ea;display:grid;place-items:center;color:#1C7A4D;font-size:18px;margin-bottom:15px;\">\u25c9<\/div>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin:0 0 9px;color:#15281d;\">Planners<\/h3>\n          <p style=\"font-size:14px;color:#52665b;margin:0;\">Less time lost to clarification; consistent, transparent interpretive decisions.<\/p>\n        <\/div>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"width:40px;height:40px;border-radius:11px;background:#e6f2ea;display:grid;place-items:center;color:#1C7A4D;font-size:18px;margin-bottom:15px;\">\u25e7<\/div>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin:0 0 9px;color:#15281d;\">Developers &amp; architects<\/h3>\n          <p style=\"font-size:14px;color:#52665b;margin:0;\">Compliance earlier in design; fewer resubmission cycles.<\/p>\n        <\/div>\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:16px;padding:24px;box-shadow:0 8px 22px rgba(16,42,28,.05);\">\n          <div style=\"width:40px;height:40px;border-radius:11px;background:#e6f2ea;display:grid;place-items:center;color:#1C7A4D;font-size:18px;margin-bottom:15px;\">\u2b21<\/div>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin:0 0 9px;color:#15281d;\">Municipalities<\/h3>\n          <p style=\"font-size:14px;color:#52665b;margin:0;\">Faster permits and clearer reasoning behind public decisions.<\/p>\n        <\/div>\n      <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== Why us ===== -->\n    <section id=\"why\" style=\"border-top:1px solid rgba(20,40,28,.07);background:#f5f8f4;\">\n      <div data-pad=\"\" style=\"max-width:1140px;margin:0 auto;padding:72px 28px;\">\n        <div data-2col=\"\" style=\"display:grid;grid-template-columns:.95fr 1.05fr;gap:54px;align-items:center;\">\n          <div data-reveal=\"\">\n            <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#1C7A4D;margin:0 0 14px;\">Why us<\/p>\n            <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:36px;line-height:1.1;letter-spacing:-.02em;margin:0 0 16px;color:#102a1c;\">Built on planning expertise, not just technology.<\/h2>\n            <p style=\"font-size:17px;color:#52665b;margin:0 0 22px;\">Led by <strong style=\"color:#15281d;font-weight:600;\">Daniels Saakjans<\/strong> \u2014 an urban planner and researcher with a PhD from ETH Z\u00fcrich and the Swiss Federal Research Institute WSL.<\/p>\n            <div style=\"display:flex;align-items:center;gap:14px;background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:14px;padding:16px;box-shadow:0 8px 24px rgba(16,42,28,.06);\">\n              <span style=\"width:46px;height:46px;border-radius:12px;background:linear-gradient(150deg,#2a9d63,#1C7A4D);display:grid;place-items:center;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;flex:none;\">DS<\/span>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font-weight:600;font-size:15px;color:#15281d;\">Daniels Saakjans<\/div>\n                <div style=\"font-size:13px;color:#56695e;\">Founder \u00b7 urban planner &amp; researcher<\/div>\n              <\/div>\n              <div style=\"display:flex;flex-direction:column;gap:8px;flex:none;\">\n                  <a href=\"https://www.linkedin.com/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#1C7A4D;background:#e6f2ea;border:1px solid #c9e6d6;border-radius:7px;padding:5px 10px;\">\n                    <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;\">in<\/span> LinkedIn\n                  <\/a>\n                  <a href=\"https://www.researchgate.net/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#1C7A4D;background:#e6f2ea;border:1px solid #c9e6d6;border-radius:7px;padding:5px 10px;\">\n                    <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;\">RG<\/span> ResearchGate\n                  <\/a>\n              <\/div>\n            <\/div>\n          <\/div>\n          <div data-stack=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n            <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:14px;padding:22px;box-shadow:0 8px 24px rgba(16,42,28,.05);\">\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:600;color:#1C7A4D;line-height:1;letter-spacing:-.02em;\">30<\/div>\n              <div style=\"font-size:13.5px;color:#52665b;margin-top:9px;\">European countries analysed in doctoral research on land-use regulation.<\/div>\n            <\/div>\n            <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(20,40,28,.08);border-radius:14px;padding:22px;box-shadow:0 8px 24px rgba(16,42,28,.05);\">\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:600;color:#1C7A4D;line-height:1;letter-spacing:-.02em;\">UK\u00b7CH<\/div>\n              <div style=\"font-size:13.5px;color:#52665b;margin-top:9px;\">Hands-on planning practice in UK and Swiss systems.<\/div>\n            <\/div>\n            <div data-reveal=\"\" style=\"grid-column:1 / -1;background:linear-gradient(150deg,#1C7A4D,#15824f);border-radius:14px;padding:22px;box-shadow:0 12px 30px rgba(28,122,77,.25);\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#bfe7cf;margin-bottom:8px;\">Technical fluency<\/div>\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:#fff;\">Geospatial \u00b7 statistics \u00b7 code<\/div>\n              <div style=\"font-size:13.5px;color:#d6ecde;margin-top:6px;\">Python, R, SQL and GIS \u2014 turning deep domain knowledge into working tools.<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== CTA / Contact ===== -->\n    <section id=\"contact\" style=\"background:#d3e6d8;border-top:1px solid rgba(20,40,28,.07);\">&gt;\n      <div data-pad=\"\" style=\"max-width:1140px;margin:0 auto;padding:64px 28px 84px;\">\n        <div data-reveal=\"\" style=\"position:relative;overflow:hidden;border-radius:22px;background:linear-gradient(150deg,#1C7A4D,#15824f);box-shadow:0 24px ius:9px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:13px;flex:none;\">\u21ba<\/span> Typical reply within 2 working days<\/div>\n            <\/div>\n          <\/div>\n          <!-- form card -->\n          <div style=\"background:#fff;margin:14px;border-radius:16px;padding:34px;box-shadow:0 18px 40px rgba(16,42,28,.18);\">\n            <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n                <div style=\"width:60px;height:60px;border-radius:50%;background:#e6f2ea;border:1px solid #bfe0cd;display:grid;place-items:center;color:#1C7A4D;font-size:28px;margin-bottom:18px;\">\u2713<\/div>\n                <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;color:#102a1c;margin:0 0 8px;\">Thanks \u2014 message sent.<\/h3>\n                <p style=\"font-size:15px;color:#52665b;margin:0;max-width:320px;\">We've received your note and will be in touch shortly. For anything urgent, email <a href=\"mailto:info@cannyscan.com\" style=\"color:#1C7A4D;font-weight:600;text-decoration:none;\">info@cannyscan.com<\/a>.<\/p>\n              <\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n            <form onsubmit=\"{{ handleSubmit }}\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;\">\n                <div>\n                  <label style=\"display:block;font-size:12.5px;font-weight:600;color:#33473b;margin-bottom:6px;\">Name<\/label>\n                  <input name=\"name\" required=\"\" placeholder=\"Your name\" style=\"width:100%;font-family:'Public Sans',sans-serif;font-size:14px;color:#15281d;background:#f5f8f4;border:1px solid rgba(20,40,28,.14);border-radius:9px;padding:11px 13px;outline:none;\" style-focus=\"border-color:#1C7A4D;background:#fff;box-shadow:0 0 0 3px rgba(28,122,77,.12);\">\n                <\/div>\n                <div>\n                  <label style=\"display:block;font-size:12.5px;font-weight:600;color:#33473b;margin-bottom:6px;\">Email<\/label>\n                  <input name=\"email\" type=\"email\" required=\"\" placeholder=\"you@org.com\" style=\"width:100%;font-family:'Public Sans',sans-serif;font-size:14px;color:#15281d;background:#f5f8f4;border:1px solid rgba(20,40,28,.14);border-radius:9px;padding:11px 13px;outline:none;\" style-focus=\"border-color:#1C7A4D;background:#fff;box-shadow:0 0 0 3px rgba(28,122,77,.12);\">\n                <\/div>\n              <\/div>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;\">\n                <div>\n                  <label style=\"display:block;font-size:12.5px;font-weight:600;color:#33473b;margin-bottom:6px;\">Organisation<\/label>\n                  <input name=\"org\" placeholder=\"Council, firm, etc.\" style=\"width:100%;font-family:'Public Sans',sans-serif;font-size:14px;color:#15281d;background:#f5f8f4;border:1px solid rgba(20,40,28,.14);border-radius:9px;padding:11px 13px;outline:none;\" style-focus=\"border-color:#1C7A4D;background:#fff;box-shadow:0 0 0 3px rgba(28,122,77,.12);\">\n                <\/div>\n                <div>\n                  <label style=\"display:block;font-size:12.5px;font-weight:600;color:#33473b;margin-bottom:6px;\">I am a\u2026<\/label>\n                  <select name=\"role\" style=\"width:100%;font-family:'Public Sans',sans-serif;font-size:14px;color:#15281d;background:#f5f8f4;border:1px solid rgba(20,40,28,.14);border-radius:9px;padding:11px 13px;outline:none;appearance:none;\" style-focus=\"border-color:#1C7A4D;background:#fff;box-shadow:0 0 0 3px rgba(28,122,77,.12);\">\n                    <option>Planner / authority<\/option>\n                    <option>Developer / architect<\/option>\n                    <option>Researcher<\/option>\n                    <option>Other<\/option>\n                  <\/select>\n                <\/div>\n              <\/div>\n              <div style=\"margin-bottom:18px;\">\n                <label style=\"display:block;font-size:12.5px;font-weight:600;color:#33473b;margin-bottom:6px;\">How can we help?<\/label>\n                <textarea name=\"message\" rows=\"4\" required=\"\" placeholder=\"Tell us a little about what you're working on\u2026\" style=\"width:100%;resize:vertical;font-family:'Public Sans',sans-serif;font-size:14px;color:#15281d;background:#f5f8f4;border:1px solid rgba(20,40,28,.14);border-radius:9px;padding:11px 13px;outline:none;\" style-focus=\"border-color:#1C7A4D;background:#fff;box-shadow:0 0 0 3px rgba(28,122,77,.12);\"><\/textarea>\n              <\/div>\n              <button type=\"submit\" style=\"width:100%;border:0;cursor:pointer;background:linear-gradient(150deg,#2a9d63,#1C7A4D);color:#fff;font-family:'Public Sans',sans-serif;font-weight:700;font-size:15px;border-radius:11px;padding:14px;box-shadow:0 8px 22px rgba(28,122,77,.28);\" style-hover=\"filter:brightness(1.05);\">Send message<\/button>\n              <p style=\"font-size:12px;color:#7a8b80;text-align:center;margin:13px 0 0;\">We'll only use your details to reply. No spam.<\/p>\n            <\/form>\n            <\/sc-if>\n          <\/div>\n        <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== Geospatial ===== -->\n    <section id=\"geospatial\" style=\"border-top:1px solid rgba(20,40,28,.08);background:#f5f8f4;\">\n      <div data-pad=\"\" style=\"max-width:1140px;margin:0 auto;padding:78px 28px;\">\n        <div data-2col=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:54px;align-items:center;\">\n          <!-- map mock -->\n          <div data-reveal=\"\" style=\"position:relative;border-radius:16px;border:1px solid rgba(20,40,28,.1);background:#eef3ec;min-height:320px;overflow:hidden;box-shadow:0 20px 50px rgba(16,42,28,.1);\">\n            <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(28,122,77,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(28,122,77,.1) 1px, transparent 1px);background-size:32px 32px;\"><\/div>\n            <div style=\"position:absolute;left:18%;top:24%;width:30%;height:40%;background:rgba(28,122,77,.07);border:1.5px solid rgba(28,122,77,.45);border-radius:6px;\"><\/div>\n            <div style=\"position:absolute;left:52%;top:48%;width:30%;height:30%;background:rgba(28,122,77,.12);border:1.5px solid rgba(28,122,77,.6);border-radius:6px;\"><\/div>\n            <div style=\"position:absolute;left:10%;top:60%;right:14%;height:1.5px;background:repeating-linear-gradient(90deg,#1C7A4D 0 8px,transparent 8px 16px);opacity:.5;\"><\/div>\n            <div style=\"position:absolute;left:33%;top:55%;width:12px;height:12px;border-radius:50%;background:#1C7A4D;box-shadow:0 0 0 5px rgba(28,122,77,.18);\"><\/div>\n            <div style=\"position:absolute;left:8px;top:8px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#1C7A4D;background:rgba(255,255,255,.85);border:1px solid #c9e6d6;border-radius:5px;padding:3px 8px;\">site analysis \u00b7 development potential<\/div>\n            <div style=\"position:absolute;left:0;right:0;bottom:0;text-align:center;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7a8b80;background:linear-gradient(180deg,transparent,rgba(238,243,236,.9));\">drop a real map here<\/div>\n          <\/div>\n          <div data-reveal=\"\">\n            <span style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#56695e;background:#fff;border:1px solid rgba(20,40,28,.12);border-radius:999px;padding:5px 12px;margin-bottom:16px;\">Service<\/span>\n            <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:32px;line-height:1.1;letter-spacing:-.02em;margin:0 0 14px;color:#102a1c;\">Geospatial &amp; planning analytics.<\/h2>\n            <p style=\"font-size:17px;color:#52665b;margin:0 0 18px;\">Bespoke spatial analysis for selected clients \u2014 grounded in real regulatory and planning expertise.<\/p>\n            <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:24px;\">\n              <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"margin-top:7px;width:6px;height:6px;border-radius:50%;background:#1C7A4D;flex:none;\"><\/span><span style=\"font-size:15px;color:#33473b;\">Site &amp; area analysis: potential, constraints, context.<\/span><\/div>\n              <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"margin-top:7px;width:6px;height:6px;border-radius:50%;background:#1C7A4D;flex:none;\"><\/span><span style=\"font-size:15px;color:#33473b;\">Custom spatial datasets and maps for residential &amp; commercial questions.<\/span><\/div>\n              <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"margin-top:7px;width:6px;height:6px;border-radius:50%;background:#1C7A4D;flex:none;\"><\/span><span style=\"font-size:15px;color:#33473b;\">Regulatory interpretation backed by doctoral research.<\/span><\/div>\n            <\/div>\n            <a href=\"mailto:info@cannyscan.com?subject=Geospatial%20analytics%20enquiry\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;color:#1f3a2a;font-weight:600;font-size:15px;padding:13px 22px;border-radius:11px;border:1px solid rgba(20,40,28,.16);background:#fff;\">Enquire about analytics \u2192<\/a>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n  <\/main>\n\n  <!-- ===== Footer ===== -->\n  <footer style=\"border-top:1px solid rgba(20,40,28,.08);position:relative;z-index:1;background:#eef0ec;\">\n    <div data-pad=\"\" style=\"max-width:1140px;margin:0 auto;padding:32px 28px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:14px;color:#7a8b80;font-size:13.5px;\">\n      <span style=\"display:flex;align-items:center;gap:9px;\"><span style=\"width:22px;height:22px;border-radius:6px;background:linear-gradient(150deg,#2a9d63,#1C7A4D);display:grid;place-items:center;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;\">C<\/span> Canny Scan \u2014 Z\u00fcrich, Switzerland<\/span>\n      <span><a href=\"mailto:info@cannyscan.com\" style=\"color:#52665b;text-decoration:none;\">info@cannyscan.com<\/a> \u00b7 <a href=\"https://canny-scan.onrender.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#52665b;text-decoration:none;\">Live demo<\/a><\/span>\n      <span>\u00a9 2026 Canny Scan<\/span>\n    <\/div>\n  <\/footer>\n\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { menuOpen: false, submitted: false };\n\n  toggleMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));\n\n  handleSubmit = (e) => {\n    e.preventDefault();\n    // No backend wired up \u2014 capture values and show confirmation.\n    this.setState({ submitted: true });\n  };\n\n  componentDidMount() {\n    requestAnimationFrame(() => {\n      document.querySelectorAll('#navlinks a').forEach(a => {\n        a.addEventListener('click', () => this.setState({ menuOpen: false }));\n      });\n      const els = document.querySelectorAll('[data-reveal]');\n      els.forEach(el => {\n        el.style.opacity = '0';\n        el.style.transform = 'translateY(18px)';\n        el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n      });\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(e => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });\n      els.forEach(el => io.observe(el));\n    });\n  }\n\n  renderVals() {\n    return {\n      menuOpen: this.state.menuOpen,\n      toggleMenu: this.toggleMenu,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      handleSubmit: this.handleSubmit,\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
